<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Ruler — AR Measure</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: white;
        }
        #canvas-container {
            position: fixed;
            inset: 0;
        }
        #canvas-container canvas {
            display: block;
        }
        #tap-prompt {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
            box-sizing: border-box;
            background: #111;
            cursor: pointer;
        }
        #tap-prompt.visible {
            display: flex;
        }
        #tap-prompt p {
            margin: 0;
            opacity: 0.7;
            font-size: 1.1rem;
        }
        #ar-ui {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            text-shadow: 1px 1px 2px black;
            padding: 0 16px;
            box-sizing: border-box;
        }
        #measurement-label {
            position: absolute;
            bottom: 80px;
            left: 16px;
            right: 16px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            color: #00ff88;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto;
        }
        #measurement-label.pulse {
            animation: pulse 0.6s ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        #unit-hint {
            position: absolute;
            bottom: 130px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.6;
        }
        #clear-btn,
        #stop-ar-btn {
            position: absolute;
            bottom: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            display: none;
        }
        #clear-btn {
            left: 50%;
            transform: translateX(-50%);
        }
        #stop-ar-btn {
            right: 16px;
            padding: 10px 16px;
            font-size: 0.9rem;
        }
        #unsupported {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #111;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
            box-sizing: border-box;
        }
        #unsupported.visible {
            display: flex;
        }
        #unsupported h1 {
            font-size: 1.5rem;
            margin: 0 0 16px;
        }
        #unsupported p {
            opacity: 0.85;
            line-height: 1.5;
            max-width: 360px;
        }
        #unsupported a {
            color: #00ff88;
            margin-top: 24px;
        }
        #app-version {
            position: fixed;
            bottom: 8px;
            left: 12px;
            z-index: 150;
            font-size: 0.7rem;
            opacity: 0.45;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="unsupported">
        <h1>AR not supported</h1>
        <p>This app needs Android Chrome and ARCore support. Your device or browser cannot run AR measurements.</p>
        <a href="https://developers.google.com/ar/devices" target="_blank" rel="noopener">Check ARCore supported devices</a>
    </div>

    <div id="tap-prompt">
        <p>Tap to start camera</p>
    </div>

    <div id="app-version"></div>

    <div id="canvas-container"></div>

    <div id="ar-ui">
        <div id="info">Point at a surface and tap to place points.</div>
        <div id="measurement-label">0.00 m</div>
        <div id="unit-hint">Tap measurement to change units</div>
        <button id="clear-btn" type="button">Clear points</button>
        <button id="stop-ar-btn" type="button">Exit AR</button>
    </div>

    <script type="module">
        import * as THREE from './vendor/three.module.js';
        import { APP_VERSION } from './version.js';

        document.getElementById('app-version').textContent = `v${APP_VERSION}`;

        const UNITS = ['m', 'cm', 'in', 'ft'];
        const UNIT_STORAGE_KEY = 'ruler-unit';
        const DEFAULT_INFO = 'Point at a surface and tap to place points.';
        const SURFACE_HINT = 'Move phone slowly and point at a textured surface (floor, table, rug).';
        const SURFACE_HINT_DELAY_MS = 1000;

        const upVector = new THREE.Vector3(0, 1, 0);
        const tempDirection = new THREE.Vector3();
        const tempPosition = new THREE.Vector3();
        const tempQuaternion = new THREE.Quaternion();
        const tempScale = new THREE.Vector3();

        let camera, scene, renderer;
        let controller;
        let reticle;
        let xrSession = null;

        let hitTestSource = null;
        let transientHitTestSource = null;
        let hitTestSourceRequested = false;
        let arSessionActive = false;
        let reticleLastVisibleAt = 0;

        const measurements = [];
        let currentLine = null;
        let pointMeshes = [];
        let lastDistanceM = 0;
        let currentUnit = loadUnit();

        const tapPrompt = document.getElementById('tap-prompt');
        const canvasContainer = document.getElementById('canvas-container');
        const arUi = document.getElementById('ar-ui');
        const info = document.getElementById('info');
        const label = document.getElementById('measurement-label');
        const clearBtn = document.getElementById('clear-btn');
        const stopArBtn = document.getElementById('stop-ar-btn');
        const unsupported = document.getElementById('unsupported');

        label.addEventListener('click', (event) => {
            event.stopPropagation();
            cycleUnit();
        });
        clearBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            clearMeasurements();
        });
        stopArBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            endARSession();
        });
        tapPrompt.addEventListener('click', () => {
            startARSession();
        });

        start();

        function loadUnit() {
            const stored = localStorage.getItem(UNIT_STORAGE_KEY);
            return UNITS.includes(stored) ? stored : 'm';
        }

        function cycleUnit() {
            const index = UNITS.indexOf(currentUnit);
            currentUnit = UNITS[(index + 1) % UNITS.length];
            localStorage.setItem(UNIT_STORAGE_KEY, currentUnit);
            if (measurements.length === 2) {
                updateMeasurementLabel(lastDistanceM, false);
            } else {
                label.textContent = formatZero();
            }
        }

        function formatDistance(meters) {
            switch (currentUnit) {
                case 'm':
                    return `${meters.toFixed(2)} m`;
                case 'cm':
                    return `${(meters * 100).toFixed(1)} cm`;
                case 'in':
                    return `${(meters * 39.3701).toFixed(1)} in`;
                case 'ft': {
                    const totalInches = meters * 39.3701;
                    const feet = Math.floor(totalInches / 12);
                    const inches = totalInches % 12;
                    return `${feet} ft ${inches.toFixed(1)} in`;
                }
            }
        }

        function formatZero() {
            switch (currentUnit) {
                case 'm':
                    return '0.00 m';
                case 'cm':
                    return '0.0 cm';
                case 'in':
                    return '0.0 in';
                case 'ft':
                    return '0 ft 0.0 in';
            }
        }

        async function start() {
            const xr = navigator.xr;
            if (!xr || !(await xr.isSessionSupported('immersive-ar'))) {
                unsupported.classList.add('visible');
                return;
            }

            init();
            animate();
            await tryAutoStartAR();
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            canvasContainer.appendChild(renderer.domElement);

            controller = renderer.xr.getController(0);
            scene.add(controller);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff88, depthTest: false, depthWrite: false })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            reticle.renderOrder = 999;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            label.textContent = formatZero();
        }

        const sessionInit = {
            requiredFeatures: ['hit-test'],
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: arUi },
        };

        async function tryAutoStartAR() {
            const xr = navigator.xr;
            if (xr.offerSession) {
                try {
                    const session = await xr.offerSession('immersive-ar', sessionInit);
                    await attachARSession(session);
                    return;
                } catch {
                    // offerSession unavailable or declined — fall through
                }
            }

            try {
                await startARSession();
            } catch {
                showTapPrompt();
            }
        }

        async function startARSession() {
            if (xrSession) {
                return;
            }

            const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
            await attachARSession(session);
        }

        async function attachARSession(session) {
            xrSession = session;

            session.addEventListener('end', onARSessionEnded);
            session.addEventListener('select', onSelect);

            renderer.xr.setReferenceSpaceType('local');
            await renderer.xr.setSession(session);

            resetHitTestSources();
            arSessionActive = true;
            reticleLastVisibleAt = performance.now();

            tapPrompt.classList.remove('visible');
            clearBtn.style.display = 'block';
            stopArBtn.style.display = 'block';
            info.textContent = DEFAULT_INFO;
        }

        function resetHitTestSources() {
            hitTestSourceRequested = false;
            hitTestSource = null;
            transientHitTestSource = null;
        }

        function showTapPrompt() {
            tapPrompt.classList.add('visible');
        }

        function endARSession() {
            if (xrSession) {
                xrSession.end();
            }
        }

        function onARSessionEnded() {
            xrSession = null;
            arSessionActive = false;
            resetHitTestSources();
            reticle.visible = false;

            clearBtn.style.display = 'none';
            stopArBtn.style.display = 'none';
            info.textContent = DEFAULT_INFO;
            showTapPrompt();
        }

        function setupHitTestSources(session) {
            if (hitTestSourceRequested) {
                return;
            }

            session.requestReferenceSpace('viewer').then((viewerSpace) => {
                session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                    hitTestSource = source;
                });
                session.requestHitTestSourceForTransientInput('generic-touchscreen').then((source) => {
                    transientHitTestSource = source;
                }).catch(() => {
                    // Transient input unavailable — reticle placement still works
                });
            });

            hitTestSourceRequested = true;
        }

        function getTapPosition(frame, referenceSpace) {
            if (transientHitTestSource) {
                const transientResults = frame.getHitTestResultsForTransientInput(transientHitTestSource);
                if (transientResults.length > 0) {
                    const pose = transientResults[0].getPose(referenceSpace);
                    if (pose) {
                        tempPosition.set(
                            pose.transform.position.x,
                            pose.transform.position.y,
                            pose.transform.position.z
                        );
                        return tempPosition.clone();
                    }
                }
            }

            if (reticle.visible) {
                reticle.matrix.decompose(tempPosition, tempQuaternion, tempScale);
                return tempPosition.clone();
            }

            return null;
        }

        function onSelect(event) {
            const frame = event.frame;
            if (!frame || !arSessionActive) {
                return;
            }

            const referenceSpace = renderer.xr.getReferenceSpace();
            const position = getTapPosition(frame, referenceSpace);

            if (!position) {
                info.textContent = SURFACE_HINT;
                return;
            }

            if (measurements.length >= 2) {
                clearMeasurements();
            }

            const marker = createPointMarker(position);
            scene.add(marker);
            pointMeshes.push(marker);
            measurements.push(position);

            if (measurements.length === 2) {
                drawLine();
                calculateDistance();
            } else {
                info.textContent = 'Tap a second point to measure.';
            }
        }

        function createPointMarker(position) {
            const group = new THREE.Group();
            group.renderOrder = 1000;

            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.035, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false, depthWrite: false })
            );

            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.05, 0.065, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff88, depthTest: false, depthWrite: false, side: THREE.DoubleSide })
            );

            group.add(sphere);
            group.add(ring);
            group.position.copy(position);
            return group;
        }

        function drawLine() {
            const start = measurements[0];
            const end = measurements[1];
            tempDirection.subVectors(end, start);
            const length = tempDirection.length();

            const geometry = new THREE.CylinderGeometry(0.008, 0.008, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, depthTest: false, depthWrite: false });
            currentLine = new THREE.Mesh(geometry, material);
            currentLine.renderOrder = 999;

            currentLine.position.copy(start).add(end).multiplyScalar(0.5);
            currentLine.quaternion.setFromUnitVectors(upVector, tempDirection.normalize());
            scene.add(currentLine);
        }

        function calculateDistance() {
            lastDistanceM = measurements[0].distanceTo(measurements[1]);
            updateMeasurementLabel(lastDistanceM, true);
            info.textContent = 'Tap again to measure something else.';
        }

        function updateMeasurementLabel(meters, pulse) {
            label.textContent = formatDistance(meters);
            if (pulse) {
                label.classList.remove('pulse');
                void label.offsetWidth;
                label.classList.add('pulse');
            }
        }

        function clearMeasurements() {
            measurements.length = 0;
            pointMeshes.forEach((mesh) => scene.remove(mesh));
            pointMeshes = [];
            if (currentLine) {
                scene.remove(currentLine);
                currentLine = null;
            }
            lastDistanceM = 0;
            label.textContent = formatZero();
            info.textContent = DEFAULT_INFO;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateSurfaceHint() {
            if (!arSessionActive) {
                return;
            }

            if (reticle.visible) {
                reticleLastVisibleAt = performance.now();
                if (info.textContent === SURFACE_HINT) {
                    info.textContent = DEFAULT_INFO;
                }
                return;
            }

            if (performance.now() - reticleLastVisibleAt >= SURFACE_HINT_DELAY_MS) {
                info.textContent = SURFACE_HINT;
            }
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                setupHitTestSources(session);

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }

                updateSurfaceHint();
            }

            renderer.render(scene, camera);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
